<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>index</title>
    <style type="text/css">
        .box1{
            height: 100px;
            width: 100px;
            background-color: red;
            position: static;
        }
        .box2{
            position: fixed;
            background-color: blue;
            width: 100px;
            height: 100px;
            top: 300px;
            left: 20px;
        }
        .box3{
            background-color: green;
            width: 100px;
            height: 100px;
            /* posiition: aboslute; position relative to enclosed element */
            position: relative; /* position relative to original position */
            /* position: sticky;  mixture of relative and fixed */
            top: 120px;
            left: 120px;
        }
    </style>
</head>
<body>
    
    <div class="box1">static</div>
    <p> blah </p>
    <p> blah </p>
    <p> blah </p>
    <div class="box2">fixed</div>
    <div class="box3">relative</div>
    <p> blah </p>
    <p> blah </p>
    <p> blah </p>
</body>
</html>
