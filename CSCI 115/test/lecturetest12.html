<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>index</title>
    <style type="text/css">
        .flexcontainer{
            display: flex;
            border: 1px solid blue;
            height: 400px;
            flex-direction: row;
            align-items: flex-end;
            justify-content: center;
            flex-wrap: nowrap;
        }
        .flexitem{
            width: 100px;
            height: 100px;
            border: 1px solid red;
            background-color: brown;
            color: aqua;
            margin: 10px;
        }
        .item{
            order: 4;
            flex-grow: 3;
        }
        .item2{
            order: 2;
            flex-grow: 4;
        }
        .item3{
            order: 1;
            flex-grow: 2;
        }
        .item4{
            order: 3;
            flex-grow: 1;
        }

    </style>
</head>
<body>
    <div class="flexcontainer">
        <div class="flexitem item"> Item-1 </div>
        <div class="flexitem item2"> Item-2 </div>
        <div class="flexitem item3"> Item-3 </div>
        <div class="flexitem item4"> Item-4 </div>
    </div>

</body>
</html>
