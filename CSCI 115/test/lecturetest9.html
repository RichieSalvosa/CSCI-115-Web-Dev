<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Box Model</title>
    <style type="text/css">
        .box1{
            width: 200px;
            height: 200px;
            background-color: red;
        }

        .box2{
            width: 100px;
            height: 100px;
            background-color: blue;
        }
        .box3{
            width: 50px;
            height: 50px;
            background-color: green;
        }
    </style>
</head>
<body>
    <!-- box 1 -->
    <div class="box1">
        <!-- box 2 -->
        <div class="box2">
            <!-- box 3 -->
            <div class="box3">

            </div>
        </div>
    </div>
</body>
</html>
